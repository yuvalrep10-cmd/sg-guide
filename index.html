<script>
(function(){
  var P=JSON.parse(document.getElementById('payload').textContent);
  function b2u(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
  async function decrypt(code){
    var enc=new TextEncoder();
    var base=await crypto.subtle.importKey('raw',enc.encode(code),{name:'PBKDF2'},false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(P.salt),iterations:150000,hash:'SHA-256'},
      base,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(P.iv)},key,b2u(P.ct));
    return new TextDecoder().decode(pt);
  }
  function render(html){document.open();document.write(html);document.close();}
  async function tryCode(code,fromStore){
    try{var html=await decrypt(code);try{sessionStorage.setItem('sg_code',code);}catch(e){}render(html);}
    catch(e){if(!fromStore)document.getElementById('err').textContent='קוד שגוי, נסו שוב';}
  }
  var saved=null;try{saved=sessionStorage.getItem('sg_code');}catch(e){}
  if(saved){tryCode(saved,true);}
  document.addEventListener('DOMContentLoaded',function(){
    document.getElementById('go').addEventListener('click',function(){tryCode(document.getElementById('pw').value.trim().toLowerCase(),false);});
    document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')tryCode(document.getElementById('pw').value.trim().toLowerCase(),false);});
    document.getElementById('pw').focus();
  });
})();
</script>
